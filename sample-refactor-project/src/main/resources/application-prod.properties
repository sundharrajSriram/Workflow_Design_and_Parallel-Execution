# Production Environment Configuration

# External API URLs - Production
external.api.validate-url=https://api.external-service.com/validate
external.api.notify-url=https://api.notification-service.com/notify

# Validation Rules - Production (strict)
validation.credit-score.min=300
validation.credit-score.max=850
validation.income.max=10000000

# ID Validation Patterns - Production
validation.customer-id.prefix=C
validation.product-id.prefix=LP

# Spring Profile
spring.profiles.active=prod